aid: data-privacy-standards
name: Data Privacy Standards
description: >-
  Data Privacy Standards is the landscape of laws, regulations, frameworks,
  and technical standards that govern the collection, processing, sharing,
  and protection of personal data. It spans GDPR, CCPA/CPRA, LGPD, PIPEDA,
  PIPL, HIPAA, ISO/IEC 27701, NIST Privacy Framework, OECD Privacy
  Principles, and emerging machine-readable consent and preference
  signals such as IAB TCF, GPC, and W3C DPV.
type: Topic
xType: topic
position: Consumer
